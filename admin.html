<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>后台控制中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft Yahei", sans-serif;
            background: #333;
            color: #fff;
            padding: 20px 10px;
            min-height: 100vh;
        }
        .admin-box {
            max-width: 800px;
            margin: 0 auto;
            background: #444;
            padding: 20px 15px;
            border-radius: 16px;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #ffd700;
            font-size: 1.5rem;
        }
        .ctrl-group {
            margin: 18px 0;
            padding: 15px;
            background: #555;
            border-radius: 8px;
        }
        h3 {
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        label {
            display: inline-block;
            width: 90px;
            font-size: 15px;
        }
        input, select {
            padding: 8px;
            width: calc(100% - 100px);
            max-width: 220px;
            font-size: 15px;
            border-radius: 4px;
            border: none;
            margin: 6px 0;
        }
        button {
            padding: 9px 18px;
            font-size: 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 4px;
        }
        .btn-red { background: #e74c3c; color:#fff; }
        .btn-blue { background: #3498db; color:#fff; }
        .btn-green { background: #27ae60; color:#fff; }
        .btn-normal { background: #999; color:#fff; }
        .record-list {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
            background: #555;
            border-radius: 8px;
        }
        .record-item {
            line-height: 2;
            border-bottom: 1px dashed #777;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="admin-box">
        <h2>比赛后台控制（6普通球 + 1特别球）</h2>

        <!-- 倒计时控制 -->
        <div class="ctrl-group">
            <h3>倒计时设置</h3>
            <label>倒计时秒数：</label>
            <input type="number" id="cdSecond" value="180">
            <button class="btn-normal" onclick="setCountdown()">应用倒计时</button>
        </div>

        <!-- 手动设置结果 -->
        <div class="ctrl-group">
            <h3>手动设置开奖结果</h3>
            <label>选择球号(01-07)：</label>
            <input type="text" id="setBall" placeholder="例如：01">
            <br>
            <label>选择颜色：</label>
            <select id="setColor">
                <option value="red">红色</option>
                <option value="blue">蓝色</option>
                <option value="green">绿色</option>
            </select>
            <br>
            <label>选手姓名：</label>
            <input type="text" id="setPlayer" placeholder="填写选手名字">
            <br>
            <button class="btn-red" onclick="submitResult()">提交结果并同步前台</button>
        </div>

        <!-- 记录管理 -->
        <div class="ctrl-group">
            <h3>记录管理</h3>
            <button class="btn-blue" onclick="clearRecord()">清空所有记录</button>
        </div>

        <!-- 全部记录 -->
        <div class="record-list" id="adminRecord">
            <div>暂无记录</div>
        </div>
    </div>

    <script>
        const totalBall = 7;
        let allRecord = [];
        let countdownNum = 180;

        // 页面加载读取本地数据
        window.onload = function(){
            const local = localStorage.getItem('ballRecord');
            if(local){
                allRecord = JSON.parse(local);
                renderAdminRecord();
            }
        }

        // 设置倒计时
        function setCountdown(){
            let val = parseInt(document.getElementById('cdSecond').value);
            if(isNaN(val) || val < 0) val = 180;
            countdownNum = val;
            localStorage.setItem('countdownNum', countdownNum);
            alert("倒计时已同步到前台！");
        }

        // 提交结果（手动指定球号/颜色/选手）
        function submitResult(){
            let ballNum = document.getElementById('setBall').value.trim();
            let color = document.getElementById('setColor').value;
            let player = document.getElementById('setPlayer').value.trim();

            // 校验球号 01-07
            let num = parseInt(ballNum);
            if(isNaN(num) || num < 1 || num > 7){
                alert("请输入合法球号：01 ~ 07");
                return;
            }
            ballNum = String(num).padStart(2,'0');

            // 当前时间
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2,0)}:${now.getMinutes().toString().padStart(2,0)}:${now.getSeconds().toString().padStart(2,0)}`;

            // 保存当前结果（前台展示用）
            const currentRes = {
                ballNum: ballNum,
                color: color,
                player: player || "未填写选手"
            };
            localStorage.setItem('currentResult', JSON.stringify(currentRes));

            // 存入历史记录
            allRecord.push({
                ballNum: ballNum,
                player: player || "未填写选手",
                time: timeStr
            });
            localStorage.setItem('ballRecord', JSON.stringify(allRecord));

            renderAdminRecord();
            alert("结果已提交，前台实时更新！");

            // 清空输入
            document.getElementById('setBall').value = '';
            document.getElementById('setPlayer').value = '';
        }

        // 渲染后台记录列表
        function renderAdminRecord(){
            const box = document.getElementById('adminRecord');
            if(allRecord.length === 0){
                box.innerHTML = "<div>暂无记录</div>";
                return;
            }
            let html = '';
            allRecord.forEach((item,idx)=>{
                html += `<div class="record-item">
                    第${idx+1}轮 | 球号：${item.ballNum} | 选手：${item.player} | 时间：${item.time}
                </div>`;
            });
            box.innerHTML = html;
        }

        // 清空记录
        function clearRecord(){
            allRecord = [];
            localStorage.removeItem('ballRecord');
            localStorage.removeItem('currentResult');
            renderAdminRecord();
            alert("所有记录已清空");
        }
    </script>
</body>
</html>
