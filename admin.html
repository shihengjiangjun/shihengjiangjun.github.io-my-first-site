<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>后台控制</title>
<style>
body{font-family:Microsoft Yahei;padding:20px;background:#f5f5f5}
.item{margin-bottom:15px}
input{width:60px;padding:8px;margin-right:5px}
select{padding:8px}
button{padding:10px 20px;background:#09f;color:#fff;border:none;border-radius:6px;margin-top:10px}
.ball{display:inline-block;width:40px;height:40px;border-radius:50%;color:#fff;line-height:40px;text-align:center;margin-right:5px}
</style>
</head>
<body>
<h2>7球控制中心（所有人同步）</h2>

<div id="editList"></div>
<button onclick="saveAll()">保存并同步所有设备</button>

<script>
const defaultData=[
    {num:'01',name:'选手1',color:'red'},
    {num:'02',name:'选手2',color:'red'},
    {num:'03',name:'选手3',color:'red'},
    {num:'04',name:'选手4',color:'blue'},
    {num:'05',name:'选手5',color:'blue'},
    {num:'06',name:'选手6',color:'blue'},
    {num:'07',name:'特别',color:'green'}
];

function renderEdit(){
    const list=JSON.parse(localStorage.getItem('ballData')||JSON.stringify(defaultData));
    const box=document.getElementById('editList');
    box.innerHTML='';
    list.forEach((item,i)=>{
        const div=document.createElement('div');
        div.className='item';
        div.innerHTML=`
            第${i+1}球：
            <input type="text" placeholder="数字" value="${item.num}" class="num${i}">
            <input type="text" placeholder="名字" value="${item.name}" class="name${i}">
            <select class="color${i}">
                <option value="red" ${item.color=='red'?'selected':''}>红</option>
                <option value="blue" ${item.color=='blue'?'selected':''}>蓝</option>
                <option value="green" ${item.color=='green'?'selected':''}>绿</option>
            </select>
        `;
        box.appendChild(div);
    });
}

function saveAll(){
    const arr=[];
    for(let i=0;i<7;i++){
        arr.push({
            num:document.querySelector(`.num${i}`).value||'00',
            name:document.querySelector(`.name${i}`).value||'选手',
            color:document.querySelector(`.color${i}`).value
        });
    }
    localStorage.setItem('ballData',JSON.stringify(arr));
    alert('同步成功！别人打开页面即可看见！');
}

window.onload=renderEdit;
</script>
</body>
</html>
