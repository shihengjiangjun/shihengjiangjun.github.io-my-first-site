<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更新网</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft Yahei", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 你的背景图，直接替换成你想用的图片链接就行 */
            background: url("https://picsum.photos/1080/1920") no-repeat center center / cover;
            color: #fff;
        }
        .container {
            /* 弹窗背景改为更通透的半透明，减少对背景的遮挡 */
            background: rgba(255, 255, 255, 0.08);
            /* 降低模糊强度，让背景更清晰 */
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 40px 30px;
            border-radius: 24px;
            max-width: 85%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 25px;
            /* 加粗文字，用深色阴影增强可读性 */
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.9);
            font-weight: bold;
            line-height: 1.3;
        }
        p {
            font-size: 1.5rem;
            line-height: 1.8;
            margin-bottom: 15px;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.9);
            font-weight: 500;
        }
        .update-time {
            margin-top: 35px;
            font-size: 1.1rem;
            opacity: 0.9;
            text-shadow: 0 0 6px rgba(0, 0, 0, 0.9);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title">认准官方失恒-148期（新澳）</h1>
        <p id="content"></p>
        <div class="update-time" id="updateTime"></div>
    </div>

    <script>
        // 从 data.json 加载内容
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('title').innerText = data.title;
                document.getElementById('content').innerText = data.content;
                document.getElementById('updateTime').innerText = `更新时间：${data.updateTime}`;
            })
            .catch(error => {
                console.error('加载失败:', error);
                document.getElementById('content').innerText = '加载失败，请检查网络或文件路径';
            });
    </script>
</body>
</html>
