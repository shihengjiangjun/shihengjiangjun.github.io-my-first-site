<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更新网</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft Yahei", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url("失恒将军.jpg") no-repeat center center / cover;
            background-color: #222;
            color: #000;
            user-select: none; /* 防止选中文字 */
        }
        .container {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 45px 35px;
            border-radius: 24px;
            max-width: 80%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 25px;
            text-shadow: 0 0 12px rgba(255, 255,255, 0.8);
            font-weight: bold;
            line-height: 1.3;
        }
        p {
            font-size: 1.5rem;
            line-height: 1.8;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            font-weight: 500;
            white-space: pre-line;
        }
        .update-time {
            margin-top: 35px;
            font-size: 1.1rem;
            opacity: 0.9;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.95);
        }
        audio {
            display: none; /* 隐藏播放器 */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title">认准官方失恒-148期（新澳）</h1>
        <p id="content"></p>
        <div class="update-time" id="updateTime"></div>
    </div>

    <!-- 背景音乐 -->
    <audio id="bgm" src="失恒将军.mp3" loop>

    <script>
        const audio = document.getElementById('bgm');
        let hasPlayed = false; // 标记是否已经播放过

        // 统一播放函数
        function playBgm() {
            if (hasPlayed) return;
            hasPlayed = true;
            audio.play().catch(e => console.log("播放失败：", e));
        }

        // 桌面端：点击
        document.addEventListener('click', playBgm);

        // 移动端：触摸、滑动
        document.addEventListener('touchstart', playBgm);[[__LINK_ICON]](http://developer.mozilla.com/en-US/docs/Games/Techniques/Control_mechanisms/Mobile_touch?f_link_type=f_linkinlinenote&flow_extra=eyJkb2NfcG9zaXRpb24iOjAsImRvY19pZCI6IjNjMTlmMTI3NWMzMGNhMjgtNTEzNGE3ZWZkNzVkNjE2ZCIsImlubGluZV9kaXNwbGF5X3Bvc2l0aW9uIjowfQ%3D%3D "[__LINK_ICON]")
        document.addEventListener('touchmove', playBgm);[[__LINK_ICON]](http://developer.mozilla.com/en-US/docs/Games/Techniques/Control_mechanisms/Mobile_touch?f_link_type=f_linkinlinenote&flow_extra=eyJkb2NfcG9zaXRpb24iOjAsImRvY19pZCI6IjNjMTlmMTI3NWMzMGNhMjgtNTEzNGE3ZWZkNzVkNjE2ZCIsImlubGluZV9kaXNwbGF5X3Bvc2l0aW9uIjowfQ%3D%3D "[__LINK_ICON]")

        // 读取 data.json
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('title').innerText = data.title;
                document.getElementById('content').innerText = data.content;
                document.getElementById('updateTime').innerText = `更新时间：${data.updateTime}`;
            })
            .catch(error => {
                console.error('加载失败:', error);
                document.getElementById('content').innerText = '加载失败，请检查网络或文件路径';
            });
    </script>
</body>
</html>
