<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>新A开奖记录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft Yahei", sans-serif;
            background: #333;
            color: #fff;
            padding: 20px 10px;
            min-height: 100vh;
        }
        .admin-box {
            max-width: 800px;
            margin: 0 auto;
            background: #444;
            padding: 20px 15px;
            border-radius: 16px;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #ffd700;
            font-size: 1.5rem;
        }
        .ctrl-group {
            margin: 18px 0;
            padding: 15px;
            background: #555;
            border-radius: 8px;
        }
        h3 {
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        .row {
            display: flex;
            align-items: center;
            margin: 10px 0;
            gap: 8px;
            flex-wrap: wrap;
        }
        .row label {
            width: 70px;
            font-size: 15px;
        }
        .row input, .row select {
            padding: 6px;
            width: 100px;
            font-size: 14px;
            border: none;
            border-radius: 4px;
        }
        button {
            padding: 9px 18px;
            font-size: 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 4px;
        }
        .btn-save { background: #e74c3c; color: #fff; }
        .btn-time { background: #999; color: #fff; }
        .btn-clear { background: #3498db; color: #fff; }
        .record-list {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
            background: #555;
            border-radius: 8px;
        }
        .record-item {
            line-height: 2;
            border-bottom: 1px dashed #777;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="admin-box">
        <h2>比赛后台（6普通球 + 1特别球）</h2>

        <div class="ctrl-group">
            <h3>全局倒计时设置</h3>
            <div class="row">
                <label>小时：</label>
                <input type="number" id="hour" value="0" min="0" max="23">
                <label>分钟：</label>
                <input type="number" id="minute" value="3" min="0" max="59">
                <button class="btn-time" onclick="setTime()">应用</button>
            </div>
        </div>

        <div class="ctrl-group">
            <h3>每球独立设置（号码01-49 / 姓名 / 圆圈颜色）</h3>
            <div class="row">
                <label>第1球：</label>
                <input type="text" id="n1" placeholder="号码">
                <input type="text" id="name1" placeholder="选手名">
                <select id="color1">
                    <option value="red">红色</option>
                    <option value="blue">蓝色</option>
                    <option value="green">绿色</option>
                </select>
            </div>
            <div class="row">
                <label>第2球：</label>
                <input type="text" id="n2" placeholder="号码">
                <input type="text" id="name2" placeholder="选手名">
                <select id="color2">
                    <option value="red">红色</option>
                    <option value="blue">蓝色</option>
                    <option value="green">绿色</option>
                </select>
            </div>
            <div class="row">
                <label>第3球：</label>
                <input type="text" id="n3" placeholder="号码">
                <input type="text" id="name3" placeholder="选手名">
                <select id="color3">
                    <option value="red">红色</option>
                    <option value="blue">蓝色</option>
                    <option value="green">绿色</option>
                </select>
            </div>
            <div class="row">
                <label>第4球：</label>
                <input type="text" id="n4" placeholder="号码">
                <input type="text" id="name4" placeholder="选手名">
                <select id="color4">
                    <option value="red">红色</option>
                    <option value="blue">蓝色</option>
                    <option value="green">绿色</option>
                </select>
            </div>
            <div class="row">
                <label>第5球：</label>
                <input type="text" id="n5" placeholder="号码">
                <input type="text" id="name5" placeholder="选手名">
                <select id="color5">
                    <option value="red">红色</option>
                    <option value="blue">蓝色</option>
                    <option value="green">绿色</option>
                </select>
            </div>
            <div class="row">
                <label>第6球：</label>
                <input type="text" id="n6" placeholder="号码">
                <input type="text" id="name6" placeholder="选手名">
                <select id="color6">
                    <option value="red">红色</option>
                    <option value="blue">蓝色</option>
                    <option value="green">绿色</option>
                </select>
            </div>
            <div class="row">
                <label>特别球：</label>
                <input type="text" id="n7" placeholder="号码">
                <input type="text" id="name7" placeholder="选手名">
                <select id="color7">
                    <option value="red">红色</option>
                    <option value="blue">蓝色</option>
                    <option value="green">绿色</option>
                </select>
            </div>
            <br>
            <button class="btn-save" onclick="saveData()">提交全部数据同步前台</button>
        </div>

        <div class="ctrl-group">
            <h3>记录操作</h3>
            <button class="btn-clear" onclick="clearAll()">清空所有记录</button>
        </div>

        <div class="record-list" id="recordBox">
            <div>暂无记录</div>
        </div>
    </div>

    <script>
        let recordArr = [];
        window.onload = function(){
            let oldRec = localStorage.getItem("gameRecord");
            if(oldRec){
                recordArr = JSON.parse(oldRec);
                renderRecord();
            }
        }

        // 设置倒计时
        function setTime(){
            let h = parseInt(document.getElementById("hour").value) || 0;
            let m = parseInt(document.getElementById("minute").value) || 0;
            if(m < 0 || m > 59){
                alert("分钟请输入 0-59");
                return;
            }
            let total = h * 3600 + m * 60;
            localStorage.setItem("countTotal", total);
            alert("倒计时已同步前台，实时走动生效");
        }

        // 号码校验：1-49，允许重复
        function checkNum(val){
            let num = parseInt(val);
            return !isNaN(num) && num >= 1 && num <= 49;
        }

        function saveData(){
            let numList = [
                document.getElementById("n1").value,
                document.getElementById("n2").value,
                document.getElementById("n3").value,
                document.getElementById("n4").value,
                document.getElementById("n5").value,
                document.getElementById("n6").value,
                document.getElementById("n7").value
            ];
            let nameList = [
                document.getElementById("name1").value || "未知选手",
                document.getElementById("name2").value || "未知选手",
                document.getElementById("name3").value || "未知选手",
                document.getElementById("name4").value || "未知选手",
                document.getElementById("name5").value || "未知选手",
                document.getElementById("name6").value || "未知选手",
                document.getElementById("name7").value || "未知选手"
            ];
            let colorList = [
                document.getElementById("color1").value,
                document.getElementById("color2").value,
                document.getElementById("color3").value,
                document.getElementById("color4").value,
                document.getElementById("color5").value,
                document.getElementById("color6").value,
                document.getElementById("color7").value
            ];

            // 逐行校验号码
            for(let i = 0; i < 7; i++){
                if(!checkNum(numList[i])){
                    alert(`第${i+1}球号码错误，请填写 1~49`);
                    return;
                }
            }

            // 组装数据
            let ballData = [];
            for(let i = 0; i < 7; i++){
                ballData.push({
                    num: String(parseInt(numList[i])).padStart(2,'0'),
                    name: nameList[i],
                    color: colorList[i]
                });
            }
            localStorage.setItem("ballAllData", JSON.stringify(ballData));

            // 正方形区域固定取 第7个特别球
            let specialBall = ballData[6];
            let now = new Date();
            let timeStr = `${now.getHours().toString().padStart(2,0)}:${now.getMinutes().toString().padStart(2,0)}:${now.getSeconds().padStart(2,0)}`;

            let currentRes = {
                num: specialBall.num,
                name: specialBall.name,
                color: specialBall.color
            };
            localStorage.setItem("currentResult", JSON.stringify(currentRes));

            // 保存历史记录
            recordArr.push({
                num: specialBall.num,
                name: specialBall.name,
                color: specialBall.color,
                time: timeStr
            });
            localStorage.setItem("gameRecord", JSON.stringify(recordArr));
            renderRecord();
            alert("数据提交成功！每球号码、名称、颜色已同步");
        }

        function renderRecord(){
            let box = document.getElementById("recordBox");
            if(recordArr.length === 0){
                box.innerHTML = "<div>暂无记录</div>";
                return;
            }
            let html = "";
            recordArr.forEach((item, idx)=>{
                html += `<div class="record-item">
                    第${idx+1}轮 | 特别球：${item.num} | 选手：${item.name} | 颜色：${item.color} | 时间：${item.time}
                </div>`;
            });
            box.innerHTML = html;
        }

        function clearAll(){
            recordArr = [];
            localStorage.removeItem("gameRecord");
            localStorage.removeItem("currentResult");
            localStorage.removeItem("ballAllData");
            localStorage.removeItem("countTotal");
            renderRecord();
            alert("所有数据、记录已清空");
        }
    </script>
</body>
</html>
