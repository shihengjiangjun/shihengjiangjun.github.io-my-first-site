<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更新网</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft Yahei", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        /* 这里替换成你自己的背景图链接 */
            background: url("https://ww3.sinaimg.cn/mw690/0069ziSmly1i1tbkgkjkdj30zk268npd.jpg") no-repeat center center / cover;
            color: #000;
            padding: 20px 0;
        }
        .container {
        /* 圈内常用的极浅透明白底色，模拟玻璃质感 */
            background: rgba(255, 255, 255, 0.8);/*颜色定义*/
        /* 核心：12px 毛玻璃模糊，和你截图的朦胧感完全匹配 */
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 45px 35px;
            border-radius: 24px;
            max-width: 80%;
            text-align: center;
        /* 加一层极细的白色边框，还原玻璃边缘的高光效果 */
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 25px;
        /* 粗黑阴影，让白色文字在半透背景上也能完全不发灰 */
            text-shadow: 0 0 12px rgba(255, 255,255, 0.8);
            font-weight: bold;
            line-height: 1.3;
        }
        p {
            font-size: 1.5rem;
            line-height: 1.8;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            font-weight: 500;
            white-space: pre-line; /* 支持 data.json 里的换行 */
        }
        .update-time {
            margin-top: 35px;
            font-size: 1.1rem;
            opacity: 0.9;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.95);
        }
        /* 新增：音乐按钮样式 */
        #musicBtn{
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            background: rgba(0,0,0,0.6);
            color: #fff;
        }
        /* 闹钟iframe容器样式 */
        .clock-box {
            margin-top: 30px;
            width: 100%;
        }
        .clock-iframe {
            width: 100%;
            height: 220px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            backdrop-filter: blur(6px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title">认准官方失恒-148期（新澳）</h1>
        <p id="content"></p>
        <div class="update-time" id="updateTime"></div>

        <!-- 闹钟嵌入区域 你只改src里的网址 -->
        <div class="clock-box">
            <iframe class="clock-iframe" src="https://ykkeajt.3kn5v-yh5pi-hgkfnu.work/iframe/3/0.html"></iframe>
        </div>
    </div>

    <!-- 音频标签 -->
    <audio id="bgm" loop preload="auto">
        <source src="失恒将军.mp3" type="audio/mpeg">
    
    <!-- 音乐按钮 -->
    <button id="musicBtn">🔊 音乐</button>

    <script>
        // 原有加载逻辑 完全未改动
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('title').innerText = data.title;
                document.getElementById('content').innerText = data.content;
                document.getElementById('updateTime').innerText = `更新时间：${data.updateTime}`;
            })
            .catch(error => {
                console.error('加载失败:', error);
                document.getElementById('content').innerText = '加载失败，请检查网络或文件路径';
            });

        // 音乐逻辑（修复版）
        const audio = document.getElementById('bgm');
        const musicBtn = document.getElementById('musicBtn');
        let isPlay = false;

        // 点击页面 / 滑动页面 触发播放
        function startAudio(){
            if(isPlay) return;
            isPlay = true;
            audio.play();
        }
        // 监听点击、滚动、手机滑动
        document.addEventListener('click', startAudio);
        window.addEventListener('scroll', startAudio);
        window.addEventListener('touchmove', startAudio);

        // 按钮开关音乐
        musicBtn.addEventListener('click',function(e){
            // 阻止按钮点击触发页面重复事件
            e.stopPropagation();
            if(audio.paused){
                audio.play();
                this.innerText = '🔊 音乐';
            }else{
                audio.pause();
                this.innerText = '🔇 静音';
            }
        })
    </script>
</body>
</html>
