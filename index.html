<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>更新网</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Microsoft Yahei,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:url("失恒将军.jpg") no-repeat center center / cover;background-color:#222;color:#000;padding:20px 10px}
.container{background:rgba(255,255,255,0.8);backdrop-filter:blur(6px);padding:20px 15px;border-radius:24px;width:100%;max-width:600px;text-align:center}
h1{font-size:2rem;margin-bottom:20px;text-shadow:0 0 12px #fff}
p{font-size:1.2rem;line-height:1.8;margin-bottom:15px}
.update-time{margin-top:20px;font-size:1rem}
.ball-wrap{display:flex;flex-wrap:nowrap;gap:8px;justify-content:center;margin:30px 0;overflow-x:auto;padding:5px}
.ball-item{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:54px}
.ball{width:44px;height:44px;border-radius:50%;color:#fff;font-size:16px;line-height:44px;font-weight:bold;border:2px solid #fff}
.ball-name{margin-top:6px;font-size:12px;width:54px;text-align:center;line-height:1.3}
</style>
</head>
<body>
<div class="container">
    <h1 id="title"></h1>
    <p id="content"></p>
    <div class="update-time" id="updateTime"></div>
    <div class="ball-wrap" id="ballWrap"></div>
</div>

<audio id="bgm" loop>
<source src="失恒将军.mp3">

<script>
// 读取data.json文字（你原来的功能完全保留）
fetch('data.json')
.then(res=>res.json())
.then(data=>{
    document.getElementById('title').innerText=data.title
    document.getElementById('content').innerText=data.content
})
.catch(()=>{
    document.getElementById('content').innerText="加载失败，请检查data.json"
})

// 时间显示
function showTime(){
    const now=new Date()
    const h=String(now.getHours()).padStart(2,'0')
    const m=String(now.getMinutes()).padStart(2,'0')
    const s=String(now.getSeconds()).padStart(2,'0')
    document.getElementById('updateTime').innerText=`当前时间：${h}:${m}:${s}`
}
showTime()
setInterval(showTime,1000)

// 背景音乐
const audio=document.getElementById('bgm')
let isPlay=false
function play(){
    if(isPlay)return
    isPlay=true
    audio.play()
}
document.addEventListener('click',play)
document.addEventListener('touchmove',play)

// 永久7个球
function initBall(){
    const wrap=document.getElementById('ballWrap')
    wrap.innerHTML=''
    for(let i=0;i<7;i++){
        const item=document.createElement('div')
        item.className='ball-item'
        const ball=document.createElement('div')
        ball.className='ball'
        const name=document.createElement('div')
        name.className='ball-name'
        item.appendChild(ball)
        item.appendChild(name)
        wrap.appendChild(item)
    }
}

// 全局同步核心
async function syncData(){
    try{
        const res=await fetch('ball_data.json?v='+Date.now())
        const list=await res.json()
        const items=document.querySelectorAll('.ball-item')
        items.forEach((el,i)=>{
            if(!list[i])return
            el.querySelector('.ball').innerText=list[i].num
            el.querySelector('.ball-name').innerText=list[i].name
            const c=list[i].color
            el.querySelector('.ball').style.background=c=='red'?'#e74c3c':c=='blue'?'#3498db':'#27ae60'
        })
    }catch(e){}
}

window.onload=function(){
    initBall()
    syncData()
    setInterval(syncData,2000)
}
</script>
</body>
</html>
