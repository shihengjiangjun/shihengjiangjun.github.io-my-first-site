<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的远程更新网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background: url("https://ww3.sinaimg.cn/mw690/0069ziSmly1i1tbkgkjkdj30zk268npd.jpg") no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            text-align: center;
            padding: 50px 20px;
            min-height: 100vh;
            filter: brightness(0.75) contrast(1.1) saturate(1.2);
        }
        .box {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            max-width: 600px;
            margin: 0 auto;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.25);
            max-height: 70vh;
            overflow-y: auto;
        }
        h1 {
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
        }
        p {
            color: #f1f1f1;
            font-size: 18px;
            margin-bottom: 15px;
            text-shadow: 0 0 6px rgba(0,0,0,0.8);
            line-height: 1.6;
        }
        .loading {
            color: #ccc;
        }
        .box::-webkit-scrollbar {
            width: 8px;
        }
        .box::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        .box::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.4);
            border-radius: 4px;
        }
        #backToTop {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            display: none;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        #backToTop:hover {
            background: rgba(0,0,0,0.9);
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="box">
        <h1 id="title" class="loading">加载中...</h1>
        <p id="content" class="loading">加载中...</p>
        <p id="time" class="loading">加载中...</p>
    </div>

    <button id="backToTop">↑</button>

    <script>
        let updateTimeStr = "";

        // 读取json内容
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('title').innerText = data.title;
                document.getElementById('content').innerText = data.content;
                updateTimeStr = data.updateTime;
                // 首次渲染精确到秒的时间
                showFullTime();
                // 每秒刷新时间
                setInterval(showFullTime, 1000);
            })
            .catch(error => {
                document.getElementById('title').innerText = "加载失败";
                document.getElementById('content').innerText = "请检查data.json文件是否存在";
            });

        // 拼接 年月日 + 时分秒
        function showFullTime(){
            const now = new Date();
            const h = String(now.getHours()).padStart(2,'0');
            const m = String(now.getMinutes()).padStart(2,'0');
            const s = String(now.getSeconds()).padStart(2,'0');
            document.getElementById('time').innerText = updateTimeStr + " " + h + ":" + m + ":" + s;
        }

        // 回到顶部
        const backToTopBtn = document.getElementById('backToTop');
        const scrollBox = document.querySelector('.box');
        scrollBox.addEventListener('scroll', () => {
            backToTopBtn.style.display = scrollBox.scrollTop > 200 ? 'block' : 'none';
        });
        backToTopBtn.addEventListener('click', () => {
            scrollBox.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>
