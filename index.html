<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更新网</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft Yahei", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url("https://ww3.sinaimg.cn/mw690/0069ziSmly1i1tbkgkjkdj30zk268npd.jpg") no-repeat center center / cover;
            color: #000;
        }
        .container {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 45px 35px;
            border-radius: 24px;
            max-width: 80%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 25px;
            text-shadow: 0 0 12px rgba(255, 255,255, 0.8);
            font-weight: bold;
            line-height: 1.3;
        }
        p {
            font-size: 1.5rem;
            line-height: 1.8;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            font-weight: 500;
            white-space: pre-line;
        }
        .update-time {
            margin-top: 35px;
            font-size: 1.1rem;
            opacity: 0.9;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.95);
        }

        /* 音乐按钮样式 */
        #musicBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            background: rgba(0,0,0,0.6);
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title">认准官方失恒-148期（新澳）</h1>
        <p id="content"></p>
        <div class="update-time" id="updateTime"></div>
    </div>

    <!-- 音乐播放代码（关键部分） -->
    <audio id="bgm" loop preload="auto">
        <source src="失恒将军.mp3" type="audio/mpeg">
    

    <button id="musicBtn">🔊 音乐</button>

    <script>
        // 数据加载
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('title').innerText = data.title;
                document.getElementById('content').innerText = data.content;
                document.getElementById('updateTime').innerText = `更新时间：${data.updateTime}`;
            })
            .catch(error => {
                console.error('加载失败:', error);
                document.getElementById('content').innerText = '加载失败，请检查网络或文件路径';
            });

        // 音乐控制逻辑
        const audio = document.getElementById('bgm');
        const btn = document.getElementById('musicBtn');
        let hasPlayed = false;

        // 先静音预加载，绕过浏览器拦截
        audio.muted = true;
        audio.play().catch(e => {});

        // 监听点击/滑动，触发播放
        function enableAudio() {
            if (hasPlayed) return;
            hasPlayed = true;
            audio.muted = false;
            audio.play();
            // 移除监听，避免重复触发
            document.removeEventListener('click', enableAudio);
            window.removeEventListener('scroll', enableAudio);
            window.removeEventListener('touchmove', enableAudio);
        }
        document.addEventListener('click', enableAudio);
        window.addEventListener('scroll', enableAudio);
        window.addEventListener('touchmove', enableAudio);

        // 按钮手动开关音乐
        btn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                btn.textContent = '🔊 音乐';
            } else {
                audio.pause();
                btn.textContent = '🔇 静音';
            }
        });
    </script>
</body>
</html>
