<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六合数据网</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background: url("https://ww1.sinaimg.cn/mw690/007QvzfIly1hx31761r51j30u01t0e81.jpg") no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            text-align: center;
            padding: 50px 20px;
            min-height: 100vh;
            filter: brightness(0.75) contrast(1.1) saturate(1.2);
        }
        .box {
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(10px);
            max-width: 600px;
            margin: 0 auto;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.25);
        }
        h1 {
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 0 0 8px rgba(0,0,0,0.5);
        }
        p {
            color: #f1f1f1;
            font-size: 18px;
            margin-bottom: 15px;
            text-shadow: 0 0 6px rgba(0,0,0,0.4);
        }
        .loading {
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1 id="title" class="loading">加载中...</h1>
        <p id="content" class="loading">加载中...</p>
        <p id="time" class="loading">加载中...</p>
    </div>

    <script>
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('title').innerText = data.title;
                document.getElementById('content').innerText = data.content;
                document.getElementById('time').innerText = "更新时间：" + data.updateTime;
            })
            .catch(error => {
                document.getElementById('title').innerText = "加载失败";
                document.getElementById('content').innerText = "请检查data.json文件是否存在";
            });
    </script>
</body>
</html>
