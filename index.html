<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更新网</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft Yahei", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 这里替换成你自己的背景图链接 */
            background: url("https://c-ssl.dtstatic.com/uploads/blog/202312/31/N5Sj9ME8tPZ1Vm7.thumb.1000_0.jpg") no-repeat center center / cover;
            color: #000;
        }
        .container {
            /* 圈内常用的极浅透明白底色，模拟玻璃质感 */
            background: rgba(255, 255, 255, 0.8);/*颜色定义*/
            /* 核心：12px 毛玻璃模糊，和你截图的朦胧感完全匹配 */
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 45px 35px;
            border-radius: 24px;
            max-width: 80%;
            text-align: center;
            /* 加一层极细的白色边框，还原玻璃边缘的高光效果 */
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 25px;
            /* 粗黑阴影，让白色文字在半透背景上也能完全不发灰 */
            text-shadow: 0 0 12px rgba(255, 255,255, 0.8);
            font-weight: bold;
            line-height: 1.3;
        }
        p {
            font-size: 1.5rem;
            line-height: 1.8;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            font-weight: 500;
            white-space: pre-line; /* 支持 data.json 里的换行 */
        }
        .update-time {
            margin-top: 35px;
            font-size: 1.1rem;
            opacity: 0.9;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.95);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title">认准官方失恒-148期（新澳）</h1>
        <p id="content"></p>
        <div class="update-time" id="updateTime"></div>
    </div>

    <script>
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('title').innerText = data.title;
                document.getElementById('content').innerText = data.content;
                document.getElementById('updateTime').innerText = `更新时间：${data.updateTime}`;
            })
            .catch(error => {
                console.error('加载失败:', error);
                document.getElementById('content').innerText = '加载失败，请检查网络或文件路径';
            });
    </script>
</body>
</html>
