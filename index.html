<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更新网</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft Yahei", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url("失恒将军.jpg") no-repeat center center / cover;
            background-color: #222;
            color: #000;
            padding: 20px 10px;
        }
        .container {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 45px 35px;
            border-radius: 24px;
            max-width: 80%;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 25px;
            text-shadow: 0 0 12px rgba(255, 255,255, 0.8);
            font-weight: bold;
            line-height: 1.3;
        }
        p {
            font-size: 1.5rem;
            line-height: 1.8;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            font-weight: 500;
            white-space: pre-line;
        }
        .update-time {
            margin-top: 35px;
            font-size: 1.1rem;
            opacity: 0.9;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.95);
        }
        audio {
            display: none;
        }

        /* 倒计时样式 */
        .countdown-box {
            margin: 30px auto 20px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 15px;
            border-radius: 12px;
            max-width: 500px;
        }
        .countdown-title {
            font-size: 1.1rem;
            margin-bottom: 10px;
        }
        .countdown-time {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd700;
        }

        /* 7个圆球布局 */
        .ball-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 25px 0;
        }
        .ball-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 65px;
        }
        .ball {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            color: #fff;
            font-size: 16px;
            line-height: 45px;
            font-weight: bold;
            border: 2px solid #fff;
            margin-bottom: 6px;
        }
        .ball-desc {
            width: 60px;
            font-size: 12px;
            text-align: center;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title"></h1>
        <p id="content"></p>
        <div class="update-time" id="updateTime"></div>

        <div class="countdown-box">
            <div class="countdown-title">下一场开球倒计时</div>
            <div class="countdown-time" id="countdown">00:00:00</div>
        </div>

        <!-- 7个球容器 -->
        <div class="ball-wrap" id="ballWrap"></div>
    </div>

    <audio id="bgm" loop>
        <source src="失恒将军.mp3" type="audio/mpeg">
    

    <script>
        // 加载data.json文字内容
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                document.getElementById('title').innerText = data.title;
                document.getElementById('content').innerText = data.content;
            })
            .catch(() => {
                document.getElementById('content').innerText = "加载失败，请检查文件";
            });

        // 系统当前时间
        function showTime() {
            const now = new Date();
            let h = String(now.getHours()).padStart(2, '0');
            let m = String(now.getMinutes()).padStart(2, '0');
            let s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('updateTime').innerText = `当前时间：${h}:${m}:${s}`;
        }
        showTime();
        setInterval(showTime, 1000);

        // 背景音乐播放
        const audio = document.getElementById('bgm');
        let isPlay = false;
        function playAudio() {
            if (isPlay) return;
            isPlay = true;
            audio.play();
        }
        document.addEventListener('click', playAudio);
        document.addEventListener('touchmove', playAudio);

        // 初始化7个圆圈
        function initBallDom() {
            const wrap = document.getElementById("ballWrap");
            wrap.innerHTML = "";
            for (let i = 0; i < 7; i++) {
                let item = document.createElement("div");
                item.className = "ball-item";
                let circle = document.createElement("div");
                circle.className = "ball";
                let desc = document.createElement("div");
                desc.className = "ball-desc";
                item.appendChild(circle);
                item.appendChild(desc);
                wrap.appendChild(item);
            }
        }

        // 倒计时运行
        function runCountdown() {
            let total = parseInt(localStorage.getItem("countTotal")) || 0;
            if (total <= 0) {
                document.getElementById("countdown").innerText = "00:00:00";
                return;
            }
            let h = Math.floor(total / 3600);
            let m = Math.floor((total % 3600) / 60);
            let s = total % 60;
            document.getElementById("countdown").innerText =
                `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
            total--;
            localStorage.setItem("countTotal", total);
        }

        // 同步后台数据：号码+号、颜色、选手名
        function syncBallData() {
            let data = localStorage.getItem("ballAllData");
            if (!data) return;
            let list = JSON.parse(data);
            let items = document.querySelectorAll(".ball-item");
            for (let i = 0; i < 7; i++) {
                if (!list[i]) continue;
                let circle = items[i].querySelector(".ball");
                let desc = items[i].querySelector(".ball-desc");
                // 数字后面加 +
                circle.innerText = list[i].num + "+";
                // 对应颜色
                if (list[i].color === "red") {
                    circle.style.background = "#e74c3c";
                } else if (list[i].color === "blue") {
                    circle.style.background = "#3498db";
                } else {
                    circle.style.background = "#27ae60";
                }
                // 显示选手名字
                desc.innerText = list[i].name;
            }
        }

        // 页面加载执行
        window.onload = function () {
             initBallDom();
             runCountdown();
             syncBallData();
             setInterval(runCountdown, 1000);
             setInterval(syncBallData, 1000);
         }
     </script>
 </body>
 </html>
