<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的远程更新网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background: url("https://ww3.sinaimg.cn/mw690/0069ziSmly1i1tbkgkjkdj30zk268npd.jpg") no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            text-align: center;
            padding: 30px 15px; /* 缩小边距，让面板更宽 */
            min-height: 100vh;
            filter: brightness(0.75) contrast(1.1) saturate(1.2);
        }
        .box {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            max-width: 95%; /* 面板宽度放大到占屏幕95% */
            width: 95%;
            margin: 0 auto;
            padding: 40px 30px; /* 调整内边距，文字不贴边 */
            border-radius: 20px; /* 圆角稍微放大，更柔和 */
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.25);
            max-height: 80vh; /* 面板高度放大到占屏幕80% */
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        h1 {
            color: #fff;
            margin-bottom: 25px;
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
            font-size: 28px; /* 标题也稍微放大 */
        }
        p {
            color: #f1f1f1;
            font-size: 20px; /* 正文文字也放大，和面板匹配 */
            margin-bottom: 18px;
            text-shadow: 0 0 6px rgba(0,0,0,0.8);
            line-height: 1.7; /* 行高放大，阅读更舒服 */
        }
        .loading {
            color: #ccc;
        }
        /* 自定义滚动条 */
        .box::-webkit-scrollbar {
            width: 10px; /* 滚动条也稍微变宽，和面板匹配 */
        }
        .box::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        .box::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.4);
            border-radius: 4px;
        }
        /* 回到顶部按钮 */
        #backToTop {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            display: none;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        #backToTop:hover {
            background: rgba(0,0,0,0.9);
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="box">
        <h1 id="title" class="loading">加载中...</h1>
        <p id="content" class="loading">加载中...</p>
        <p id="time" class="loading">加载中...</p>
    </div>

    <button id="backToTop">↑</button>

    <script>
        let updateTimeStr = "";

        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('title').innerText = data.title;
                document.getElementById('content').innerText = data.content;
                updateTimeStr = data.updateTime;
                showFullTime();
                setInterval(showFullTime, 1000);
            })
            .catch(error => {
                document.getElementById('title').innerText = "加载失败";
                document.getElementById('content').innerText = "请检查data.json文件是否存在";
            });

        // 时间精确到秒，实时刷新
        function showFullTime(){
            const now = new Date();
            const h = String(now.getHours()).padStart(2,'0');
            const m = String(now.getMinutes()).padStart(2,'0');
            const s = String(now.getSeconds()).padStart(2,'0');
            document.getElementById('time').innerText = updateTimeStr + " " + h + ":" + m + ":" + s;
        }

        // 回到顶部功能
        const backToTopBtn = document.getElementById('backToTop');
        const scrollBox = document.querySelector('.box');
        scrollBox.addEventListener('scroll', () => {
            backToTopBtn.style.display = scrollBox.scrollTop > 200 ? 'block' : 'none';
        });
        backToTopBtn.addEventListener('click', () => {
            scrollBox.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>
