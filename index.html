<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更新网</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft Yahei", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url("失恒将军.jpg") no-repeat center center / cover;
            background-color: #222;
            color: #000;
        }
        .container {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 45px 35px;
            border-radius: 24px;
            max-width: 80%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 25px;
            text-shadow: 0 0 12px rgba(255, 255,255, 0.8);
            font-weight: bold;
            line-height: 1.3;
        }
        p {
            font-size: 1.5rem;
            line-height: 1.8;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            font-weight: 500;
            white-space: pre-line;
        }
        .update-time {
            margin-top: 35px;
            font-size: 1.1rem;
            opacity: 0.9;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.95);
        }
        audio {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title">认准官方失恒-148期（新澳）</h1>
        <p id="content"></p>
        <div class="update-time" id="updateTime"></div>
    </div>

    <audio id="bgm" loop>
        <source src="失恒将军.mp3" type="audio/mpeg">
    

    <script>
        // 读取json数据
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('title').innerText = data.title;
                document.getElementById('content').innerText = data.content;
            })
            .catch(error => {
                document.getElementById('content').innerText = '加载失败，请检查网络或文件路径';
            });

        // 时间实时刷新（到秒）
        function setTime() {
            const now = new Date();
            const h = now.getHours().toString().padStart(2,'0');
            const m = now.getMinutes().toString().padStart(2,'0');
            const s = now.getSeconds().toString().padStart(2,'0');
            document.getElementById('updateTime').innerText = `当前时间：${h}:${m}:${s}`;
        }
        setTime();
        setInterval(setTime, 1000);

        // 点击/滑动播放音乐，只触发一次
        const audio = document.getElementById('bgm');
        let played = false;
        function playMusic() {
            if(played) return;
            played = true;
            audio.play();
        }
        document.addEventListener('click', playMusic);
        document.addEventListener('touchmove', playMusic);
    </script>
</body>
</html>
