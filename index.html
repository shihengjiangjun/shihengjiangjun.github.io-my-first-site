<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>比赛结果展示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft Yahei", sans-serif;
            background: url("失恒将军.jpg") no-repeat center center / cover;
            background-color: #222;
            color: #000;
            padding: 20px 10px;
            min-height: 100vh;
        }
        .container {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 20px 15px;
            border-radius: 24px;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            text-shadow: 0 0 12px rgba(255, 255,255, 0.8);
            font-weight: bold;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            font-weight: 500;
        }
        .update-time {
            margin-top: 20px;
            font-size: 1rem;
            opacity: 0.9;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.95);
            padding-bottom: 20px;
        }
        audio {
            display: none;
        }

        /* 倒计时区域 */
        .countdown-box {
            margin: 20px auto;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 15px;
            border-radius: 12px;
            max-width: 500px;
        }
        .countdown-title {
            font-size: 1.1rem;
            margin-bottom: 10px;
        }
        .countdown-time {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd700;
        }
        /* 正方形结果面板 */
        .result-panel {
            width: 140px;
            height: 140px;
            background: #fff;
            border-radius: 12px;
            margin: 15px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 3px solid #333;
        }
        .current-ball {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            color: #fff;
            font-size: 24px;
            line-height: 65px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .current-ball.red { background: #e74c3c; }
        .current-ball.blue { background: #3498db; }
        .current-ball.green { background: #27ae60; }
        .current-player {
            font-size: 1rem;
            color: #333;
        }

        /* 7个球布局：6普通 + 1特别球 */
        .ball-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 25px 0;
        }
        .ball-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 65px;
        }
        .ball {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            color: #fff;
            font-size: 16px;
            line-height: 45px;
            font-weight: bold;
            border: 2px solid #fff;
            margin-bottom: 6px;
            background: #333;
        }
        /* 特别球 金色边框 */
        .ball.special {
            border: 2px solid gold;
        }
        .ball-input {
            width: 60px;
            height: 26px;
            font-size: 12px;
            text-align: center;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #f5f5f5;
            pointer-events: none; /* 禁止编辑 */
        }

        /* 记录列表 固定滚动 */
        .record-list {
            margin: 20px auto;
            text-align: left;
            max-width: 900px;
            max-height: 220px;
            overflow-y: auto;
            padding: 15px;
            background: rgba(255,255,255,0.6);
            border-radius: 12px;
        }
        .record-item {
            font-size: 0.95rem;
            line-height: 1.8;
            border-bottom: 1px dashed #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title"></h1>
        <p id="content"></p>

        <!-- 倒计时 + 正方形结果面板 -->
        <div class="countdown-box">
            <div class="countdown-title">下一场开球倒计时</div>
            <div class="countdown-time" id="countdown">03:00</div>
            <div class="result-panel">
                <div class="current-ball" id="currentBall">--</div>
                <div class="current-player" id="currentPlayer">暂无结果</div>
            </div>
        </div>

        <!-- 6普通球 + 1特别球 -->
        <div class="ball-wrap" id="ballWrap"></div>

        <!-- 历史记录 -->
        <div class="record-list" id="recordList">
            <div class="record-item">暂无开球记录</div>
        </div>

        <div class="update-time" id="updateTime"></div>
    </div>

    <audio id="bgm" loop>
        <source src="失恒将军.mp3" type="audio/mpeg">
    

    <script>
        // 读取配置
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                document.getElementById('title').innerText = data.title;
                document.getElementById('content').innerText = data.content;
            })
            .catch(() => {
                document.getElementById('content').innerText = "加载失败，请检查文件";
            });

        // 实时时间
        function showTime() {
            const now = new Date();
            let h = String(now.getHours()).padStart(2, '0');
            let m = String(now.getMinutes()).padStart(2, '0');
            let s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('updateTime').innerText = `当前时间：${h}:${m}:${s}`;
        }
        showTime();
        setInterval(showTime, 1000);

        // 背景音乐
        const audio = document.getElementById('bgm');
        let isPlay = false;
        function playAudio() {
            if (isPlay) return;
            isPlay = true;
            audio.play();
        }
        document.addEventListener('click', playAudio);
        document.addEventListener('touchmove', playAudio);

        const totalBall = 7; // 6普通 + 1特别
        const specialIndex = 6;
        let allRecord = [];

        // 初始化7个球
        function initBallList() {
            const wrap = document.getElementById('ballWrap');
            wrap.innerHTML = '';
            for (let i = 0; i < totalBall; i++) {
                const num = String(i + 1).padStart(2, '0');
                const item = document.createElement('div');
                item.className = 'ball-item';

                const ball = document.createElement('div');
                ball.className = 'ball';
                if(i === specialIndex) ball.classList.add('special');
                ball.innerText = num;

                const input = document.createElement('input');
                input.className = 'ball-input';
                input.placeholder = '选手名';
                input.dataset.ballNum = num;

                item.appendChild(ball);
                item.appendChild(input);
                wrap.appendChild(item);
            }
        }

        // 同步后台数据
        function syncData() {
            const localRecord = localStorage.getItem('ballRecord');
            if(localRecord){
                allRecord = JSON.parse(localRecord);
                renderRecord();
            }
            const nowData = localStorage.getItem('currentResult');
            if(nowData){
                const res = JSON.parse(nowData);
                const ballDom = document.getElementById('currentBall');
                const playerDom = document.getElementById('currentPlayer');
                ballDom.innerText = res.ballNum;
                ballDom.className = `current-ball ${res.color}`;
                playerDom.innerText = res.player;

                const inputs = document.querySelectorAll('.ball-input');
                inputs.forEach(input => {
                    if(input.dataset.ballNum === res.ballNum){
                        input.value = res.player;
                    }
                });
            }
            const cd = localStorage.getItem('countdownNum');
            if(cd){
                const min = Math.floor(+cd / 60);
                const sec = +cd % 60;
                document.getElementById('countdown').innerText = 
                    `${String(min).padStart(2,0)}:${String(sec).padStart(2,0)}`;
            }
        }

        // 渲染记录
        function renderRecord() {
            const box = document.getElementById('recordList');
            if (allRecord.length === 0) {
                box.innerHTML = '<div class="record-item">暂无开球记录</div>';
                return;
            }
            let html = '';
            allRecord.forEach((item, idx) => {
                html += `<div class="record-item">
                    第${idx+1}轮 | 球号：${item.ballNum} | 选手：${item.player} | 时间：${item.time}
                </div>`;
            });
            box.innerHTML = html;
        }

        window.onload = function(){
            initBallList();
            syncData();
            setInterval(syncData, 1000);
        }
    </script>
</body>
</html>
