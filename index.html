<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更新网</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft Yahei", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url("https://ww3.sinaimg.cn/mw690/0069ziSmly1i1tbkgkjkdj30zk268npd.jpg") no-repeat center center / cover;
            color: #000;
            padding: 20px 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 45px 35px;
            border-radius: 24px;
            max-width: 80%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 25px;
            text-shadow: 0 0 12px rgba(255, 255,255, 0.8);
            font-weight: bold;
            line-height: 1.3;
        }
        p {
            font-size: 1.5rem;
            line-height: 1.8;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            white-space: pre-line;
        }
        .update-time {
            margin-top: 35px;
            font-size: 1.1rem;
            opacity: 0.9;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.95);
        }
        #musicBtn{
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            background: rgba(0,0,0,0.6);
            color: #fff;
        }
        /* 闹钟/记录容器样式 */
        .clock-box {
            margin-top: 30px;
            width: 100%;
            overflow: hidden;
        }
        .clock-iframe {
            width: 100%;
            height: 260px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            transform: scale(1);
            transform-origin: left top;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title">认准官方失恒-148期（新澳）</h1>
        <p id="content"></p>
        <div class="update-time" id="updateTime"></div>

        <div class="clock-box">
            <iframe class="clock-iframe"
                    src="https://ykkeajt.3kn5v-yh5pi-hgkfnu.work/iframe/3/0.html"
                    sandbox="allow-scripts allow-same-origin"
                    scrolling="no">
            </iframe>
        </div>
    </div>

    <audio id="bgm" loop preload="auto">
        <source src="失恒将军.mp3" type="audio/mpeg">
    
    
    <button id="musicBtn">🔊 音乐</button>

    <script>
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('title').innerText = data.title;
                document.getElementById('content').innerText = data.content;
                document.getElementById('updateTime').innerText = `更新时间：${data.updateTime}`;
            })
            .catch(error => {
                console.error('加载失败:', error);
                document.getElementById('content').innerText = '加载失败，请检查网络或文件路径';
            });

        const audio = document.getElementById('bgm');
        const musicBtn = document.getElementById('musicBtn');
        let isPlay = false;

        function startAudio(){
            if(isPlay) return;
            isPlay = true;
            audio.play();
        }
        document.addEventListener('click', startAudio);
        window.addEventListener('scroll', startAudio);
        window.addEventListener('touchmove', startAudio);

        musicBtn.addEventListener('click',function(e){
            e.stopPropagation();
            if(audio.paused){
                audio.play();
                this.innerText = '🔊 音乐';
            }else{
                audio.pause();
                this.innerText = '🔇 静音';
            }
        })
    </script>
</body>
</html>
